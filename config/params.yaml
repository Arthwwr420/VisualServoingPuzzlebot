# params.yaml — Puzzlebot Tracker (LQR Edition)
# Control Óptimo LQR + Visión Clásica (ArUco / HSV)
#
# Todos los parámetros son reconfigurables en caliente:
#   ros2 param set /vision_cam_tracker <param> <valor>
#   ros2 param set /lqr_visual_controller <param> <valor>

vision_tracker:
  ros__parameters:

    # Modo de detección del objetivo
    # 'aruco'  → solo marcadores ArUco (más robusto y preciso)
    # 'hsv'    → solo blob de color (no requiere marcador físico)
    # 'hybrid' → ArUco primario, HSV como respaldo automático
    detection_mode: "hsv"

    # Configuración ArUco
    aruco_dict_id:     0      # 0=DICT_4X4_50 | 1=DICT_4X4_100 | 10=DICT_5X5_50
    aruco_target_id:   0      # ID del marcador específico a seguir
    aruco_marker_size: 0.10   # Tamaño real del lado del marcador [m] — medir con regla

    # Rangos de color HSV para segmentación (verde brillante por defecto)
    # Para calibrar: ejecutar un script de calibración HSV con sliders
    # Verde:  hsv_lower: [35, 60, 60]    hsv_upper: [85, 255, 255]
    # Rojo:   hsv_lower: [0, 100, 100]   hsv_upper: [10, 255, 255]
    # Azul:   hsv_lower: [100, 80, 80]   hsv_upper: [130, 255, 255]
    hsv_lower: [35, 60, 60]
    hsv_upper: [85, 255, 255]
    hsv_min_area: 800          # Área mínima de contorno [px²] — filtra ruido pequeño

    # Parámetros de cámara
    image_width:  640
    image_height: 480
    # Focal length para cámara 640x480 con FOV ~60°:
    #   fx = (img_width / 2) / tan(FOV_h / 2) ≈ 554 px
    # Para valores precisos usar: ros2 run camera_calibration cameracalibrator
    camera_fx: 554.0
    camera_fy: 554.0

    # Filtro de media móvil exponencial (EMA)
    # alpha=1.0 → sin filtro (máxima respuesta)
    # alpha=0.2 → muy suave (respuesta lenta)
    # alpha=0.35 → equilibrio recomendado a 30fps
    ema_alpha: 0.35

    lost_frames_max: 12        # Frames consecutivos sin detección para declarar pérdida
    publish_debug:   true      # Publicar /detection/debug para RViz o rqt_image_view


lqr_visual_controller:
  ros__parameters:

    # Distancia objetivo al objeto [m]
    desired_distance: 0.50

    # Límites de velocidad
    v_max:     0.12            # Velocidad lineal máxima [m/s]  (reducido para pruebas)
    omega_max: 1.20            # Velocidad angular máxima [rad/s]

    # Paso de tiempo del modelo discreto [s]
    sample_time: 0.03333       # ~30 Hz

    # Ganancias del modelo de primer orden
    model_k_w: 1.0             # Sensibilidad angular: ė_x = -k_w · ω
    model_k_v: 1.0             # Sensibilidad lineal:  ė_d = -k_v · v

    # Matrices de peso LQR — Q penaliza el error de estado, R el esfuerzo de control
    # Mayor Q → corrección más agresiva | Mayor R → movimientos más conservadores
    q_ex:   12.0               # Peso del error horizontal e_x
    q_ed:    2.0               # Peso del error de distancia e_d
    q_iex:   0.8               # Peso de la integral de e_x
    q_ied:   0.4               # Peso de la integral de e_d
    r_omega: 0.15              # Penalización del esfuerzo angular ω
    r_v:     0.80              # Penalización del esfuerzo lineal v

    # Límites anti-windup de los integradores
    int_ex_max: 2.0
    int_ed_max: 1.5

    # Deadzones (evitan micro-oscilaciones en equilibrio)
    deadzone_ex: 0.04          # Error horizontal mínimo activo [normalizado]
    deadzone_ed: 0.04          # Error de distancia mínimo activo [m]

    # Comportamiento ante pérdida del objetivo
    lost_timeout:   1.5        # Tiempo sin detección para iniciar búsqueda [s]
    search_omega:   0.35       # Velocidad de giro en modo búsqueda [rad/s]
    centering_gain: 1.2        # Factor de reducción de v cuando el objetivo no está centrado
